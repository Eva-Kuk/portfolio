<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Portfolio - Full Stack web development" />
    <meta name="author" content="Ewa Kukla">
    <!--font awesome-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&family=Open+Sans&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.0/css/all.min.css" integrity="sha512-10/jx2EXwxxWqCLX/hHth/vu2KY3jCF70dCQB8TSgNjbCVAC/8vai53GfMDrO2Emgwccf2pJqxct9ehpzG+MTw==" crossorigin="anonymous" referrerpolicy="no-referrer"
    />
    <!--css style-->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"  type="text/css">
    <!--favicon-->
    <link rel="apple-touch-icon" sizes="180x180" href="{{url_for('static', filename='favicon/apple-touch-icon.png')}}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{url_for('static', filename='favicon/favicon-32x32.png')}}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{url_for('static', filename='favicon/favicon-16x16.png')}}">

    <title>Ewa Kukla | Portfolio | Full Stack Web Developer</title>    
  </head>
  <body>
    <!-- Main content -->   
    <main>      
        {% block content %}
        {% endblock %}   
    </main>

       <!-- Navigation buttons -->
       <div class="icon-bar">
        <div class="nav-icon  control-1 active-btn" title="Home" aria-label="Home Link" data-id="home">
          <a href="{{ url_for('home') }}"><i class="fas fa-home"></i></a>
        </div>
        <div class="nav-icon control-2 " title="About Me" aria-label="About Me Link" data-id="about">
          <a href="{{ url_for('about') }}"><i class="fas fa-user"></i></a>
        </div>
        <div class="nav-icon control-3" title="Projects" aria-label="Projects Link" data-id="projects">
          <a href="{{ url_for('projects') }}"><i class="fas fa-briefcase"></i></a>
        </div>
        <div class="nav-icon control-5" title="Contact" aria-label="Contact Link" data-id="contact">
          <a href="{{ url_for('contact') }}"><i class="fas fa-envelope"></i></a>
        </div>
      </div>
      <!-- Dark & Light theme buttons -->
      <div class="theme-btn" title="Dark Light Mode" aria-label="Dark Light Mode">
          <i class="fas fa-adjust"></i>
      </div>
  <!-- Footer -->
    <footer>
      <div class="footer-container">
          <div class="contact-icons">
              <div class="contact-icon">
                  <a href="https://www.linkedin.com/in/ewa-kukla/" target="_blank" rel="noopener" aria-label="Go to LinkedIn Link">
                      <i class="fab fa-linkedin-in"></i>
                  </a>
                  <a href="https://github.com/Eva-Kuk" target="_blank" rel="noopener" aria-label="Go to GitHub Link">
                      <i class="fab fa-github"></i>
                  </a>
              </div>
          </div>
      </div>
    </footer>
    <!-- Custom script -->
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
  </body>
</html>
