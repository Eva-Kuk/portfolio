{% extends 'base.html' %}
{% block content %}
<div class="section section1 header active" id="home">
  <div class="header-content">
      <div class="left-header">
          <div class="h-shape"></div>
          <div class="image">
              <img src="static/img/hero.png" alt="Image of Ewa Kukla">
          </div>
      </div>
      <div class="right-header">
          <div class="logo">
              <a href="#">
                  <video autoplay muted><source src="{{ url_for('static', filename='img/logo.mp4') }}" type="video/mp4" aria-label="animated logo">Ewa Kukla</video>
              </a>
          </div>
          <h1 class="name">
              Hello, I'm <br><span>Eva Kukla</span>
          </h1>
          <h2> Junior Full Stack Web Developer</h2>
          <p>
              WELCOME TO <span>my portfolio</span>
          </p>
          <div class="btn-con">
              <a href="{{ url_for('static', filename='cv/cv-ewa-kukla.pdf') }}" target="_blank" aria-hidden="true" class="main-btn">
                  <span class="btn-text">Download CV</span>
                  <span class="btn-icon"><i class="fas fa-download"></i></span>
              </a>
          </div>
      </div>
  </div>
</div>
{% endblock %}
