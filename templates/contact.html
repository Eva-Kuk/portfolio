{% extends 'base.html' %}
{% block content %}
<section class="section section4" id="contact">
    <div class="contact-container">
    <div class="main-title">
        <h2>Contact <span>me</span></h2>
    </div>
    <form action="{{ url_for('contact') }}" method="POST">
        {{ form.csrf_token }}
     
        {{ form.name.label }}
        {{ form.name }}
     
        {{ form.email.label }}
        {{ form.email }}
     
        {{ form.subject.label }}
        {{ form.subject }}
     
        {{ form.message.label }}
        {{ form.message }}
     
        {{ form.submit }}
      </form>
    </div>
</section>
{% endblock %}
